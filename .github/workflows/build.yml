name: Build Wine-DotNet Base

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'wine-dotnet/entrypoint.sh'
      - 'wine-dotnet/Dockerfile'
  pull_request:
    types: [closed]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          ref: main

      - name: Login to GitHub Container Registry
        run: echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@master
        with:
          platforms: all

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push to GHCR and Docker Hub
        id: docker_build_push_ghcr
        uses: docker/build-push-action@v5
        with:
          context: ./wine-dotnet
          file: ./wine-dotnet/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/insertdisc/yolks:wine-dotnet
            ${{ secrets.DOCKER_HUB_USERNAME }}/yolks:wine-dotnet
          cache-from: type=gha
          cache-to: type=gha,mode=max
          
